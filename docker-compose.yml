services:
  mongodb:
    image: mongo:7
    container_name: secrets-mongodb
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: secrets-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/secrets}
      - CORS_ORIGIN=http://localhost:5173
      - NODE_ENV=production
    env_file:
      - ./server/.env
    depends_on:
      mongodb:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: secrets-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo-data:
